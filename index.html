<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Ferramentas</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>

    <header>
        <h1>Painel de Ferramentas</h1>
        <img id="theme" src="./img/moon.png" alt="alternar tema" />
    </header>

    <main>

        <aside>
            <ul id="menu">
                <li><a id="conversor"   href="">Conversor</a></li>
                <li><a id="imc"         href="">IMC</a></li>
                <li><a id="temperatura" href="">Temperatura</a></li>
                <li><a id="velocidade"  href="">Velocidade</a></li>
                <li><a id="massa"       href="">Massa</a></li>
                <li><a id="regra3"      href="">Regra de 3</a></li>
            </ul>
        </aside>

        <section class="hidden conversor">
            <h2>Conversor de Moedas</h2>
            <p class="subtitulo">Cotação do dólar em tempo real (USD → BRL)</p>

            <div class="cotacao-box" id="cotacao-box">
                <span id="cotacao-status">Buscando cotação...</span>
            </div>

            <div class="form-conversor">
                <div class="campo">
                    <label for="conv-valor">Valor em USD ($):</label>
                    <input type="number" id="conv-valor" placeholder="Ex: 100" min="0" step="0.01" />
                </div>
                <button id="btn-converter">Converter para BRL</button>
            </div>

            <div id="conv-resultado"></div>
        </section>

        <section class="hidden imc">
            <h2>Cálculo de IMC por Gênero </h2>

            <div class="form-conversor">
                <div class="campo">
                    <label for="imc-peso">Peso (kg):</label>
                    <input type="number" id="imc-peso" placeholder="Ex: 70" min="1" step="0.1" />
                </div>
                <div class="campo">
                    <label for="imc-altura">Altura (m):</label>
                    <input type="number" id="imc-altura" placeholder="Ex: 1.75" min="0.01" step="0.01" />
                </div>
                <div class="campo">
                    <label for="imc-genero">Gênero:</label>
                    <select id="imc-genero">
                        <option value="">Selecione...</option>
                        <option value="M">Masculino</option>
                        <option value="F">Feminino</option>
                    </select>
                </div>
                <button id="btn-calcular-imc">Calcular IMC</button>
            </div>

            <section class="hidden temperatura">
            <h2>Conversor de Temperatura</h2>

            <div class="form-conversor">
                <div class="campo">
                    <label for="temp-valor">Valor:</label>
                    <input type="number" id="temp-valor" placeholder="Ex: 100" step="0.01" />
                </div>
                <div class="campo">
                    <label for="temp-direcao">Converter:</label>
                    <select id="temp-direcao">
                        <option value="CF">°C → °F</option>
                        <option value="FC">°F → °C</option>
                        </select>


                
                <button id="btn-converter-temp">Converter</button>
            </div>

            <div id="temp-resultado"></div>
            












                </main>

    <footer>
        <em><p>Todos os direitos reservados © 2023</p></em>
    </footer>

</body>
</html>
